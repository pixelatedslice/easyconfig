name: "Test"

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Allow permission
        run: chmod +x ./gradlew

      - name: Test with gradle
        run: ./gradlew test

      - name: Export common jacoco
        uses: actions/upload-artifact@v4
        with:
          name: Common code coverage
          path: api-implementation/build/reports/jacoco/test/html
          if-no-files-found: error